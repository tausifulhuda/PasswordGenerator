<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Password Generator</title>
        <script src="index.js" defer></script>
    </head>
    <body>
        <div class="layout">
            <h1>Generate a <br><span class="green">random password</span></h1>
            <h3>Never use an insecure password again.</h3>
            <br>
            <button onclick="generatePasswords()">Generate passwords</button>
            <br><br><br>
            <div class="line"></div>
            <br><br>
            <div class="flex">
                <div class="password" id="first_pass">&nbsp;</div>
                <div class="password" id="second_pass">&nbsp;</div>
            </div>
        </div>
    </body>
</html>
